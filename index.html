<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mesut.uk — App Pages</title>
  <meta name="description" content="Support and privacy pages for apps by Mesut." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <nav class="nav-inner">
      <a class="nav-brand" href="/">mesut.uk</a>
      <ul class="nav-links">
        <li><a href="/veiltext/support">Support</a></li>
        <li><a href="/veiltext/privacy">Privacy</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="site-wrapper">
      <section class="hero">
        <span class="hero-badge">App Pages</span>
        <h1>mesut.uk</h1>
        <p>Support and privacy information for apps by Mesut.</p>
      </section>

      <h2 style="color:#7c7c9a; font-size:0.78rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1rem;">Apps</h2>
      <div class="apps-grid">
        <div class="app-card">
          <div class="app-card-name">Veiltext</div>
          <div class="app-card-desc">Private, encrypted notes — stored only on your device.</div>
          <div class="app-card-links">
            <a class="btn btn-primary" href="/veiltext/support">Support</a>
            <a class="btn btn-ghost" href="/veiltext/privacy">Privacy</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Mesut &middot; <a href="https://github.com/Mesutcydev/Veiltext">GitHub</a></p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
